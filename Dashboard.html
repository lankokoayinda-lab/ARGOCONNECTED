
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroConnect+ | Dashboard</title>
    <link rel="stylesheet" href="../statics/Dashboard.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="main-header">
            <div class="header-left">
                <span class="brand">AgroConnect+</span>
                <h1 class="welcome">Welcome back, Raissa</h1>
            </div>
            
            <div class="header-right">
                
                    <button class="btn-primary" id="openModal">+ Add product</button>

                    <div id="myModal" class="modal">
                        <div class="modal-content">
                            <span class="close-btn">&times;</span>
                            <h2>Add New Product</h2>
                            <form>
                                <input type="text" placeholder="Product Name" required>
                                <input type="number" placeholder="Price" required>
                                <input type="number" placeholder="Quantity" required>
                                <input type="file" accept="image/*" required>
                                <input type="text" placeholder="Description" required>
                                <button type="submit" class="btn-primary">Add Product</button>
                            </form>
                        </div>

    
</div>
                </button>
                
                    <div class="dropdown">
                        <button class="btn-primary">Options ▼</button>
                        <div class="dropdown-content">
                            <a href="Profile.html"> My Profile</a>
                            <a href="#"> Home</a>
                            <a href="#"> About us</a>
                            <a href="#">Logout</a>
                        </div>
                    </div>
                
            </div>
        </header>

        <section class="summary-grid">
            <div class="card">
                <h3>Total Product</h3>
                <p class="stat">25</p>
            </div>
            <div class="card">
                <h3>Product Sold</h3>
                <p class="stat">10</p>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <p class="stat warning">8</p>
            </div>
            <div class="card">
                <h3>Equipment Rented</h3>
                <p class="stat info">3</p>
            </div>
        </section>

        <section class="table-container card">
            <h2>Recent Activity</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Buyer</th>
                        <th>Product</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>John</td>
                        <td>Tomatoes</td>
                        <td><span class="status-badge pending">Pending</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Raissa</td>
                        <td>Onion</td>
                        <td><span class="status-badge complete">Complete</span></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Mary</td>
                        <td>Rice</td>
                        <td><span class="status-badge pending">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

<script>
    const modal = document.getElementById("myModal");
const btn = document.getElementById("openModal");

const closeBtn = document.querySelector(".close-btn");

// Show the modal
btn.onclick = () => modal.style.display = "block";

// Hide the modal
closeBtn.onclick = () => modal.style.display = "none";
</script>
</body>
</html>
